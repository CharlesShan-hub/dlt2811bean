server:
  port: 8102
  sslPort: 9102
  sclFile: config/sample-scd-full.scd

client:
  defaultIedName: E1Q1SB1
  defaultAccessPoint: S1
  defaultSecure: false
  connectTimeoutMs: 5000
  requestTimeoutMs: 5000

keepalive:
  idleTimeoutMs: 60000
  retryIntervalMs: 5000
  maxRetries: 4

protocol:
  pi: 1
  maxAsduSize: 65531
  defaultArrayCapacity: 256

security:
  enabled: false
  keystore:
    path: certs/server.pfx
    password: changeit
  truststore:
    path: certs/ca.cer
    password: changeit

negotiate:
  apduSize: 65535
  asduSize: 65531
  protocolVersion: 1
  modelVersion: "1.0"

file:
  rootPath: config/files
