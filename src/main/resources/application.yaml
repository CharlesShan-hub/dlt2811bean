server:
  port: 8102
  sslPort: 9102
  sclFile: config/sample-scd-full.scd

client:
  defaultAccessPoint: E1Q1SB1
  defaultEp: S1
  connectTimeoutMs: 5000
  requestTimeoutMs: 5000

keepalive:
  idleTimeoutMs: 30000
  retryIntervalMs: 5000
  maxRetries: 4

security:
  enabled: false
  keystore:
    path: certs/server.pfx
    password: changeit
  truststore:
    path: certs/ca.cer
    password: changeit

protocol:
  pi: 1
  maxAsduSize: 65531

negotiate:
  apduSize: 65535
  asduSize: 65531
  protocolVersion: 1
  modelVersion: "1.0"
